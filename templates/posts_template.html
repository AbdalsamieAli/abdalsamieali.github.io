{% extends "post_base.html" %}

{% block style %}

<link rel="stylesheet" href="{{ posts[index].css }}">

{% endblock %}

{% block content %}

    <div class="container">
        <ul class="posts">
            <li>
                <h2>{{ posts[index].title }}</h2>
                <br>
                <span class="date">{{ posts[index].date }}</span>
                <br>
                <p class="content">{{ posts[index].content }}</p>
            </li>
        </ul>
    </div>


{% endblock %}

{% block js %}

<script src="{{ posts[index].js }}"></script>

{% endblock %}
